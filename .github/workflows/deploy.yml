name: Build & Deploy Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/genai-assistant

jobs:
  # ── 1. Build & push image to GitHub Container Registry ──────────────────────
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app          # Dockerfile lives inside /app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to server via SSH (only on push to main) ──────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}       # server IP / hostname
          username: ${{ secrets.DEPLOY_USER }}       # SSH username
          key:      ${{ secrets.DEPLOY_SSH_KEY }}    # private SSH key
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            # Pull latest code
            cd ${{ secrets.DEPLOY_PATH || '/opt/genai-assistant' }}
            git pull origin main

            # Log in to GHCR on the server
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the freshly built image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Restart stack (API key read from server's .env, NOT committed)
            docker compose down --remove-orphans
            docker compose up -d --pull always

            # Prune old images
            docker image prune -f

# ─── Required GitHub Secrets ──────────────────────────────────────────────────
# Set these in: Settings → Secrets and variables → Actions
#
#  DEPLOY_HOST        — IP or hostname of your production server
#  DEPLOY_USER        — SSH user on that server (e.g. ubuntu, root)
#  DEPLOY_SSH_KEY     — Private SSH key (generate with ssh-keygen, add pub to server)
#  DEPLOY_PATH        — Absolute path to project on server (e.g. /opt/genai-assistant)
#  DEPLOY_PORT        — SSH port (optional, defaults to 22)
#
# GEMINI_API_KEY must exist in .env on the SERVER, never in this repo.
# The .env file is gitignored. The server's docker-compose reads it via env_file or
# environment variables set in the server's shell environment.
